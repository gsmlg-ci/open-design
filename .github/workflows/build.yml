name: docker-buildimage-open-design

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build.yml'
      - 'README.md'

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Checkout open-design
        uses: actions/checkout@v6
        with:
          repository: nexu-io/open-design
          ref: main
          path: open-design
      -
        name: Get open-design version
        id: open-design-version
        run: |
          VERSION=$(node -p "require('./open-design/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      -
        name: Add opencode CLI to runtime image
        run: |
          cat >> open-design/deploy/Dockerfile <<'EOF'

          USER root
          RUN npm install -g opencode-ai@latest && \
              opencode --version && \
              npm cache clean --force
          USER open-design
          EOF
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWD }}
      -
        name: Login to Github Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: open-design
          file: open-design/deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/gsmlg/open-design:v${{ steps.open-design-version.outputs.version }}
            docker.io/gsmlg/open-design:latest
            ghcr.io/gsmlg-dev/open-design:v${{ steps.open-design-version.outputs.version }}
            ghcr.io/gsmlg-dev/open-design:latest
